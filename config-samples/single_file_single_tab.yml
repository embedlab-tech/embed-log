version: 1

server:
  host: 127.0.0.1
  ws_port: 8080
  app_name: embed-log
  open_browser: true
  verbosity: full
  timestamp_mode: absolute

logs:
  dir: logs/single_file_single_tab/

sources:
  - name: APP_LOG
    label: App Log
    type: file
    port: /var/log/myapp.log

tabs:
  - label: Logs
    panes: [APP_LOG]
