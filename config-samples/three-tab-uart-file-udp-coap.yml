# Three-tab config: UART serial, file log tail, and UDP with CoAP inspection.
# Demonstrates: multi-tab layout, file source, per-pane CoAP plugin.
#
# Tab layout:
#   1. Serial — two UART devices side-by-side
#   2. Logs   — a single file source (tail-follow /var/log/myapp.log)
#   3. Net    — two UDP listeners; one pane decodes embedded CoAP packets

version: 1

server:
  host: 127.0.0.1
  ws_port: 8080
  app_name: embed-log
  open_browser: true
  timestamp_mode: absolute

logs:
  dir: logs/

baudrate: 115200

sources:
  # --- Serial tab -------------------------------------------------------
  - name: DUT
    type: uart
    port: /dev/ttyUSB0
    inject_port: 5001

  - name: DEBUG
    type: uart
    port: /dev/ttyACM0
    baudrate: 921600
    inject_port: 5002

  # --- Logs tab ---------------------------------------------------------
  - name: APP_LOG
    type: file
    port: /var/log/myapp.log
    # Tail-follows the file. Each new line becomes a log entry.

  # --- Net tab ----------------------------------------------------------
  - name: TELEMETRY
    type: udp
    port: 6000
    inject_port: 5003

  - name: COAP_DEVICE
    label: CoAP
    type: udp
    port: 6001
    inject_port: 5004

frontend_plugins:
  hex-coap:
    builtin: hex-coap

tabs:
  - label: Serial
    panes: [DUT, DEBUG]

  - label: Logs
    panes: [APP_LOG]

  - label: Net
    panes:
      - source: TELEMETRY
      - source: COAP_DEVICE
        plugins: [hex-coap]
