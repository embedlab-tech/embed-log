# Example command suggestions for UART TX autocomplete.
# Place this file next to your embed-log.yml, or name it
# <config-stem>.commands.yml (e.g. project.commands.yml).

sources:
  MCU_MAIN:
    - "version\r\n"
    - "status\r\n"
    - "heap free\r\n"
    - "tasks\r\n"
    - "uptime\r\n"
    - "reboot\r\n"
    - "df /flash\r\n"
    - "config read\r\n"
    - "config write ssid MyWiFi\r\n"
    - "config write password hunter2\r\n"
    - "wifi scan\r\n"
    - "wifi connect\r\n"
    - "wifi disconnect\r\n"
    - "sensors read\r\n"
    - "sensors calibrate\r\n"
    - "log level debug\r\n"
    - "log level info\r\n"

  RADIO:
    - "AT\r\n"
    - "AT+VERSION\r\n"
    - "AT+ADDRESS\r\n"
    - "AT+CHANNEL=6\r\n"
    - "AT+ROLE=COORDINATOR\r\n"
    - "AT+ROLE=ROUTER\r\n"
    - "AT+PANID=0x1A2B\r\n"
    - "AT+SCAN\r\n"
    - "AT+JOIN\r\n"
    - "AT+SEND=hello\r\n"
    - "AT+RECV\r\n"
    - "AT+SLEEP=1\r\n"
    - "AT+WAKE\r\n"
    - "AT+RESET\r\n"
