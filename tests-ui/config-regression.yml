version: 1

server:
  host: 127.0.0.1
  ws_port: 8080
  app_name: embed-log e2e
  open_browser: false
  timestamp_mode: relative

frontend_plugins:
  hex-coap:
    builtin: hex-coap

logs:
  dir: .tmp/logs

sources:
  - name: SENSOR_A
    label: DEVICE_A
    type: udp
    port: 6000

  - name: SENSOR_B
    label: HOST
    type: udp
    port: 6001

  - name: SENSOR_C
    label: AUX
    type: udp
    port: 6002

  - name: SENSOR_D
    label: PYTEST
    type: udp
    port: 6004

  - name: SENSOR_COAP
    label: CoAP
    type: udp
    port: 6005

  - name: SENSOR_CBOR
    label: CBOR
    type: udp
    port: 6003
    parser:
      type: cbor-datagram

  # UART sources (silent — no PTY fds in test harness)
  - name: UART_DUT
    label: DUT
    type: udp
    port: 6100

  - name: UART_DEBUG
    label: DEBUG
    type: udp
    port: 6101

  # Network tab (mock capture)
  - name: NET_CAPTURE
    label: Net
    type: network_capture
    network_backend: mock
    interface: mock0
    mock_interval: 1.0
    bpf_filter: ""

tabs:
  - label: DevA
    panes:
      - source: SENSOR_A
        plugins: [hex-coap]
      - SENSOR_B

  - label: DevB
    panes: [SENSOR_C]

  - label: PYTEST
    panes: [SENSOR_D]

  - label: cbor-tab
    panes: [SENSOR_CBOR]

  - label: CoAP
    panes:
      - source: SENSOR_COAP
        plugins: [hex-coap]

  - label: UART
    panes: [UART_DUT, UART_DEBUG]

  - label: Network
    panes: [NET_CAPTURE]
