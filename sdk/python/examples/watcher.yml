server:
  url: ws://127.0.0.1:8080/api/v1/control

output:
  path: watch-matches.jsonl

watch:
  - name: fatal-error
    sources: [DUT_UART]
    pattern: "ZEPHYR FATAL ERROR"
    marker: true

  - name: watchdog
    sources: [DUT_UART]
    pattern: "watchdog: (?P<seconds>\\d+)s"
    marker: true

  - name: boot-complete
    sources: [DUT_UART, PYTEST]
    pattern: "boot complete"
    marker: false
