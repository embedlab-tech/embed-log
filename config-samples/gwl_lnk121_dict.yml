# GWL LNK121 development — dictionary HEX logs on controller + reader UART.
#
# Prepare enriched dictionaries from a west build (once per rebuild):
#   python3 /path/to/gwl/scripts/logging/gwl_dict_decode.py \
#     /path/to/gwl/build_verify_inside_dev --enrich-only
#   python3 /path/to/gwl/scripts/logging/gwl_dict_decode.py \
#     /path/to/gwl/build_verify_outside_dev --enrich-only
#
# Run:
#   embed-log run --config config-samples/gwl_lnk121_dict.yml

app_name: GWL LNK121 dictionary logs
baudrate: 115200

sources:
  - name: CONTROLLER
    label: Controller (dict log)
    type: uart
    port: /dev/ttyUSB0
    baudrate: 115200
    parser:
      type: gwl-dict
      database: ../gwl/build_verify_inside_dev/zephyr/log_dictionary.json

  - name: READER
    label: Reader (dict log)
    type: uart
    port: /dev/ttyUSB1
    baudrate: 115200
    parser:
      type: gwl-dict
      database: ../gwl/build_verify_outside_dev/zephyr/log_dictionary.json

tabs:
  - label: LNK121
    panes: [CONTROLLER, READER]

merges: []
