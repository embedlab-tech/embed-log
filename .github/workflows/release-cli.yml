name: Release CLI

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag recorded in artifacts, e.g. v1.0.0. Required for a branch dry run."
        required: false
        type: string
      publish_release:
        description: "Create or update the GitHub Release after all matrix jobs pass"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-cli-${{ inputs.tag || github.ref }}-publish-${{ inputs.publish_release || github.event_name == 'push' }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  test-and-package:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            id: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            binary: embed-log
            deb: true
          - name: macOS Apple Silicon
            id: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
            binary: embed-log
            deb: false
          - name: macOS Intel
            id: macos-x64
            os: macos-14
            target: x86_64-apple-darwin
            archive: tar.gz
            binary: embed-log
            deb: false
          - name: Windows x64
            id: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            binary: embed-log.exe
            deb: false
    steps:
      - name: Check release tag
        shell: bash
        run: |
          case "$RELEASE_TAG" in
            v*) ;;
            *) echo "RELEASE_TAG must start with v, got: $RELEASE_TAG" >&2; exit 1 ;;
          esac

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Run CLI, core, and TUI tests
        run: cargo test --locked --target ${{ matrix.target }} --package embed-log-core --package embed-log-cli --package embed-log-tui

      - name: Build native release CLI
        run: cargo build --locked --release --target ${{ matrix.target }} --package embed-log-cli --bin embed-log

      - name: Align binary path for packaging scripts (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p target/release
          cp target/${{ matrix.target }}/release/embed-log target/release/embed-log

      - name: Align binary path for packaging scripts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path target/release
          Copy-Item -Path target/${{ matrix.target }}/release/embed-log.exe -Destination target/release/embed-log.exe

      - name: Package Unix CLI
        if: runner.os != 'Windows'
        run: ./scripts/package-cli.sh ${{ matrix.target }}

      - name: Package Windows CLI
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/package-cli.ps1 -Target ${{ matrix.target }}

      - name: Build Linux .deb package
        if: matrix.deb
        run: |
          cargo install cargo-deb --locked
          cargo deb --no-build --target ${{ matrix.target }} -p embed-log-cli -o dist/embed-log-x86_64-unknown-linux-gnu.deb

      - name: Smoke-test Unix archive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          archive="dist/embed-log-${{ matrix.target }}.tar.gz"
          mkdir smoke
          tar -xzf "$archive" -C smoke
          test -x "smoke/${{ matrix.binary }}"
          "smoke/${{ matrix.binary }}" version --json

      - name: Verify Unix self-update from packaged CLI
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [ "${{ matrix.target }}" = "x86_64-apple-darwin" ]; then
            echo "Spoofing x86_64 architecture for Python environment..."
            echo 'import platform; platform.machine = lambda: "x86_64"; platform.processor = lambda: "i386"' > sitecustomize.py
            export PYTHONPATH=$PWD
            python3 scripts/test_update_integration.py --binary "smoke/${{ matrix.binary }}"
            rm sitecustomize.py
          else
            python3 scripts/test_update_integration.py --binary "smoke/${{ matrix.binary }}"
          fi

      - name: Smoke-test Windows archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archive = "dist/embed-log-${{ matrix.target }}.zip"
          Expand-Archive -Path $archive -DestinationPath smoke -Force
          $binary = "smoke/${{ matrix.binary }}"
          if (!(Test-Path $binary)) { throw "Archive is missing $binary" }
          & $binary version --json

      - name: Verify Windows self-update guidance
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $result = & "smoke/${{ matrix.binary }}" update --json | ConvertFrom-Json
          if ($result.self_update_supported -ne $false) {
            throw "Windows update command unexpectedly reported self-update support"
          }

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.id }}
          path: |
            dist/embed-log-${{ matrix.target }}.${{ matrix.archive }}
            dist/embed-log-x86_64-unknown-linux-gnu.deb
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    if: github.event_name == 'push' || inputs.publish_release
    runs-on: ubuntu-latest
    needs: test-and-package
    timeout-minutes: 20
    steps:
      - name: Check release tag
        shell: bash
        run: |
          case "$RELEASE_TAG" in
            v*) ;;
            *) echo "RELEASE_TAG must start with v, got: $RELEASE_TAG" >&2; exit 1 ;;
          esac

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Download tested native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Add installers and checksums
        shell: bash
        run: |
          set -euo pipefail
          cp install.sh dist/install.sh
          cp install.ps1 dist/install.ps1
          chmod 755 dist/install.sh
          cd dist
          sha256sum \
            embed-log-x86_64-unknown-linux-gnu.tar.gz \
            embed-log-x86_64-unknown-linux-gnu.deb \
            embed-log-aarch64-apple-darwin.tar.gz \
            embed-log-x86_64-apple-darwin.tar.gz \
            embed-log-x86_64-pc-windows-msvc.zip \
            install.sh \
            install.ps1 > SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/embed-log-x86_64-unknown-linux-gnu.tar.gz
            dist/embed-log-x86_64-unknown-linux-gnu.deb
            dist/embed-log-aarch64-apple-darwin.tar.gz
            dist/embed-log-x86_64-apple-darwin.tar.gz
            dist/embed-log-x86_64-pc-windows-msvc.zip
            dist/install.sh
            dist/install.ps1
            dist/SHA256SUMS

            git commit -m "fix: run integration test under x86_64 emulation on macOS cross-runner" -m "- Fixes an architecture mismatch in test_update_integration.py where the host (ARM64) conflicted with the cross-compiled target (x86_64).
- Added 'arch -x86_64' to force Python into Rosetta emulation for the Intel package verification step."