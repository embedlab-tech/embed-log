<!DOCTYPE html>
<html lang="en" data-theme="whitesand">
<head>
    <meta charset="UTF-8">
    <title>embed-log</title>
    <link rel="stylesheet" href="viewer.css">
</head>
<body>

<!-- ── TOOLBAR ────────────────────────────────────────────── -->
<!-- Canonical toolbar: frontend/toolbar.html -->
<div id="toolbar">
    <span class="app-name">embed-log</span>
    <div class="sep"></div>
    <button id="btn-clear"    title="Clear all panes">Clear</button>
    <button id="btn-export"   title="Export current session as a self-contained HTML file">Export HTML</button>
    <button id="btn-download-raw" title="Download all logs as merged raw text file">Download raw</button>
    <button id="btn-unwrap"  title="Unwrap multi-pane tabs into single-pane tabs">Unwrap</button>
    <div class="sep"></div>
    <button id="btn-theme" title="Toggle light / dark theme">🌙</button>
    <div id="ws-status" class="disconnected">WS: disconnected</div>
    <div id="marker-nav" class="marker-nav" style="display:none">
        <button id="marker-nav-prev" title="Previous marker">◀</button>
        <span id="marker-nav-idx">1</span>/<span id="marker-nav-total">0</span>
        <button id="marker-nav-next" title="Next marker">▶</button>
    </div>
</div>


<div id="download-raw-menu">
    <div class="download-raw-head">Download raw logs</div>
    <div class="download-raw-body">
        <button id="btn-download-merged" class="download-raw-opt">Merged (.log) — all panes interleaved</button>
        <button id="btn-download-split" class="download-raw-opt">Per pane (.log files) — one file per source</button>
    </div>
</div>

<!-- ── TAB BAR — hidden by tabs.js when only one tab ─────── -->
<div id="tab-bar"></div>

<!-- ── PANES ──────────────────────────────────────────────── -->
<div id="container">
    <!-- panes are created dynamically by ws.js as devices connect -->
</div>

<script type="module" src="main.js"></script>
</body>
</html>
