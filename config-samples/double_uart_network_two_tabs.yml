
version: 1

server:
  host: 127.0.0.1
  ws_port: 8080
  app_name: embed-log
  open_browser: true
  verbosity: full
  timestamp_mode: absolute

logs:
  dir: logs/double_uart_network_two_tabs/

baudrate: 115200

sources:
  - name: DUT_UART
    label: DUT UART
    type: uart
    port: /dev/ttyUSB0
    inject_port: 5001

  - name: AUX_UART
    label: AUX UART
    type: uart
    port: /dev/ttyUSB1
    inject_port: 5002

  # Mock mode runs without Scapy/sudo. Switch network_backend to scapy and
  # interface to a real adapter for live capture. Replace the TEST-NET
  # addresses in bpf_filter with the MCU/host addresses for your bench.
  - name: DEVICE_NETWORK
    label: Device Network
    type: network_capture
    network_backend: mock
    interface: mock0
    mock_interval: 1.0
    bpf_filter: "(host 192.0.2.10 or host 192.0.2.20) and udp"

tabs:
  - label: Device
    panes: [DUT_UART, AUX_UART]

  - label: Network
    panes: [DEVICE_NETWORK]
