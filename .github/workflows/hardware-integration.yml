name: STM lab validation

on:
  # Trusted branch only: this workflow operates the exclusive physical rig.
  push:
    branches: [release-mvp]
  workflow_dispatch:
    inputs:
      hardware_test_command:
        description: "Hardware command run after all local build, unit, and integration checks"
        required: false
        default: "python -m pytest sdk/python/tests/test_backend_hardware_stm32g0_multi_uart.py -q"
        type: string
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: read

# The lab owns physical devices; never run two hardware jobs concurrently.
concurrency:
  group: stm-lab-hardware
  cancel-in-progress: false

jobs:
  stm-lab:
    name: Local build, integration, and STM hardware validation
    runs-on: [self-hosted, Linux, stm-lab]
    timeout-minutes: 120
    # The rig is pre-flashed and connected. Prefer repository-variable
    # overrides, but default to this runner's verified stable by-id paths.
    env:
      CI: "true"
      CARGO_TERM_COLOR: always
      EMBED_LOG_STM32G0_HARDWARE: "1"
      EMBED_LOG_STM32G0_CONTROL_PORT: ${{ vars.EMBED_LOG_STM32G0_CONTROL_PORT || '/dev/serial/by-id/usb-STMicroelectronics_STM32_STLink_0669FF485552787187184556-if02' }}
      EMBED_LOG_STM32G0_USART1_PORT: ${{ vars.EMBED_LOG_STM32G0_USART1_PORT || '/dev/serial/by-id/usb-FTDI_Quad_RS232-HS-if03-port0' }}
      EMBED_LOG_STM32G0_USART3_PORT: ${{ vars.EMBED_LOG_STM32G0_USART3_PORT || '/dev/serial/by-id/usb-FTDI_Quad_RS232-HS-if02-port0' }}
      EMBED_LOG_STM32G0_USART4_PORT: ${{ vars.EMBED_LOG_STM32G0_USART4_PORT || '/dev/serial/by-id/usb-FTDI_Quad_RS232-HS-if00-port0' }}
      EMBED_LOG_STM32G0_ARTIFACT_DIR: captures/stm32g0
      HARDWARE_TEST_COMMAND: ${{ inputs.hardware_test_command || 'python -m pytest sdk/python/tests/test_backend_hardware_stm32g0_multi_uart.py -q' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tests-ui/package-lock.json

      - name: Build release CLI locally
        run: cargo build --locked --release --package embed-log-cli --bin embed-log

      - name: Use locally built CLI
        shell: bash
        run: |
          set -euo pipefail
          echo "$PWD/target/release" >> "$GITHUB_PATH"
          target/release/embed-log version --json

      - name: Run Rust unit tests
        run: cargo test --locked --package embed-log-core --package embed-log-cli

      - name: Install Python integration dependencies
        run: python -m pip install -e 'sdk/python[dev]'

      - name: Run Python SDK and backend integration tests
        run: >-
          python -m pytest sdk/python/tests -q
          --ignore=sdk/python/tests/test_backend_hardware_uart.py
          --ignore=sdk/python/tests/test_backend_hardware_stm32g0_multi_uart.py

      - name: Install Playwright test dependencies
        run: npm --prefix tests-ui ci

      - name: Install Playwright Chromium
        working-directory: tests-ui
        run: npx playwright install chromium

      - name: Run UI unit tests
        run: npm --prefix tests-ui run test:unit

      - name: Run Playwright end-to-end tests
        run: npm --prefix tests-ui run test:e2e

      - name: Run Playwright regression tests
        run: npm --prefix tests-ui run test:regression

      - name: Verify all configured UARTs
        shell: bash
        run: |
          set -euo pipefail
          for name in CONTROL USART1 USART3 USART4; do
            variable="EMBED_LOG_STM32G0_${name}_PORT"
            port="${!variable}"
            test -n "$port"
            embed-log doctor --serial "$port"
          done

      - name: Run STM32G0 hardware integration test
        shell: bash
        run: $HARDWARE_TEST_COMMAND

      - name: Upload local validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stm-lab-artifacts-${{ github.run_id }}
          path: |
            captures/
            support*.tar.gz
            tests-ui/playwright-report/
            tests-ui/test-results/
          if-no-files-found: ignore
