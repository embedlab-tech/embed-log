name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Build, test, and UI e2e
    runs-on: self-hosted
    timeout-minutes: 90
    env:
      CI: "true"
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Show Rust versions
        run: |
          rustc --version
          cargo --version
          rustup show

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Build workspace
        run: cargo build --locked --workspace

      - name: Clippy
        run: cargo clippy --locked --workspace --all-targets -- -D warnings

      - name: Rust tests
        run: cargo test --locked --workspace

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tests-ui/package-lock.json

      - name: Install UI test dependencies
        run: npm --prefix tests-ui ci

      - name: Install Playwright Chromium
        working-directory: tests-ui
        run: |
          if [ "${RUNNER_OS}" = "Linux" ]; then
            npx playwright install --with-deps chromium
          else
            npx playwright install chromium
          fi

      - name: UI unit tests
        run: npm --prefix tests-ui run test:unit

      - name: UI e2e tests
        run: npm --prefix tests-ui run test:e2e

      - name: UI parity e2e tests
        run: npm --prefix tests-ui run test:parity

      - name: Upload Playwright reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ runner.os }}
          path: |
            tests-ui/playwright-report/
            tests-ui/test-results/
          if-no-files-found: ignore
