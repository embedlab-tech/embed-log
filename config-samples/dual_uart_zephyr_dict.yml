# Dual-board development — dictionary HEX logs on two UARTs.
#
# log_dictionary.json is generated by west build (database_gen.py includes log_strings).
#
# Run:
#   embed-log run --config config-samples/dual_uart_zephyr_dict.yml

app_name: Dual-board dictionary logs
baudrate: 115200

sources:
  - name: NODE_A
    label: Node A (dict log)
    type: uart
    port: /dev/ttyUSB0
    baudrate: 115200
    parser:
      type: zephyr-dict
      database: ../firmware/build_inside_dev/zephyr/log_dictionary.json

  - name: NODE_B
    label: Node B (dict log)
    type: uart
    port: /dev/ttyUSB1
    baudrate: 115200
    parser:
      type: zephyr-dict
      database: ../firmware/build_outside_dev/zephyr/log_dictionary.json

tabs:
  - label: Dual Board
    panes: [NODE_A, NODE_B]

merges: []
