version: 1

server:
  host: 127.0.0.1
  ws_port: 8080
  app_name: embed-log
  open_browser: true
  verbosity: full
  timestamp_mode: absolute

logs:
  dir: logs/double_uart_file_two_tabs/

baudrate: 115200

sources:
  - name: DUT_UART
    label: DUT UART
    type: uart
    port: /dev/ttyUSB0
    inject_port: 5001

  - name: AUX_UART
    label: AUX UART
    type: uart
    port: /dev/ttyUSB1
    inject_port: 5002

  - name: APP_LOG
    label: App Log
    type: file
    port: /var/log/myapp.log

tabs:
  - label: Device
    panes: [DUT_UART, AUX_UART]

  - label: Logs
    panes: [APP_LOG]
