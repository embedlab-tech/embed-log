version: 1

server:
  host: 127.0.0.1
  ws_port: 8080
  app_name: demo
  open_browser: true
  default_light_theme: whitesand
  default_dark_theme: one-dark
  verbose: false
  timestamp_mode: relative

logs:
  dir: logs/

sources:
  - name: SENSOR_A
    label: READER
    type: udp
    port: 6000
    inject_port: 5001

  - name: SENSOR_B
    label: CONTROLLER
    type: udp
    port: 6001
    inject_port: 5002

  - name: SENSOR_C
    label: READER
    type: udp
    port: 6002
    inject_port: 5003

  - name: SENSOR_CBOR
    label: CBOR
    type: udp
    port: 6003
    parser:
      type: cbor-datagram

tabs:
  - label: DevA
    panes: [SENSOR_A, SENSOR_B]

  - label: DevB
    panes: [SENSOR_C]

  - label: cbor-tab
    panes: [SENSOR_CBOR]
