name: Release CLI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, e.g. v0.1.0. Required when running from a branch."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-cli-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  build-linux-x64:
    name: Build CLI / Linux x64
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Check release tag
        shell: bash
        run: |
          case "$RELEASE_TAG" in
            v*) ;;
            *) echo "RELEASE_TAG must start with v, got: $RELEASE_TAG" >&2; exit 1 ;;
          esac

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build CLI
        run: cargo build --locked --release --package embed-log-cli --bin embed-log

      - name: Package CLI
        run: ./scripts/package-cli.sh x86_64-unknown-linux-gnu

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-linux-x64
          path: dist/embed-log-x86_64-unknown-linux-gnu.tar.gz
          if-no-files-found: error

  build-macos:
    name: Build CLI / macOS
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - name: Check release tag
        shell: bash
        run: |
          case "$RELEASE_TAG" in
            v*) ;;
            *) echo "RELEASE_TAG must start with v, got: $RELEASE_TAG" >&2; exit 1 ;;
          esac

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build Apple Silicon CLI
        run: cargo build --locked --release --package embed-log-cli --bin embed-log

      - name: Package Apple Silicon CLI
        run: ./scripts/package-cli.sh aarch64-apple-darwin

      - name: Build Intel CLI
        run: |
          rustup target add x86_64-apple-darwin
          cargo build --locked --release --package embed-log-cli --bin embed-log --target x86_64-apple-darwin

      - name: Package Intel CLI
        run: BIN_PATH=target/x86_64-apple-darwin/release/embed-log ./scripts/package-cli.sh x86_64-apple-darwin

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-macos
          path: dist/embed-log-*-apple-darwin.tar.gz
          if-no-files-found: error

  build-windows-x64:
    name: Build CLI / Windows x64
    runs-on: [self-hosted, Windows, X64]
    steps:
      - name: Check release tag
        shell: pwsh
        run: |
          if (-not $env:RELEASE_TAG.StartsWith("v")) {
            throw "RELEASE_TAG must start with v, got: $env:RELEASE_TAG"
          }

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build CLI
        run: cargo build --locked --release --package embed-log-cli --bin embed-log

      - name: Package CLI
        shell: pwsh
        run: ./scripts/package-cli.ps1 -Target x86_64-pc-windows-msvc

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-windows-x64
          path: dist/embed-log-x86_64-pc-windows-msvc.zip
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: [self-hosted, Linux, X64]
    needs:
      - build-linux-x64
      - build-macos
      - build-windows-x64
    steps:
      - name: Check release tag
        shell: bash
        run: |
          case "$RELEASE_TAG" in
            v*) ;;
            *) echo "RELEASE_TAG must start with v, got: $RELEASE_TAG" >&2; exit 1 ;;
          esac

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: cli-*
          merge-multiple: true
          path: dist

      - name: Add installer and checksums
        shell: bash
        run: |
          set -euo pipefail
          cp install.sh dist/install.sh
          cp install.ps1 dist/install.ps1
          chmod 755 dist/install.sh
          cd dist
          sha256sum \
            embed-log-x86_64-unknown-linux-gnu.tar.gz \
            embed-log-aarch64-apple-darwin.tar.gz \
            embed-log-x86_64-apple-darwin.tar.gz \
            embed-log-x86_64-pc-windows-msvc.zip \
            install.sh \
            install.ps1 > SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/embed-log-x86_64-unknown-linux-gnu.tar.gz
            dist/embed-log-aarch64-apple-darwin.tar.gz
            dist/embed-log-x86_64-apple-darwin.tar.gz
            dist/embed-log-x86_64-pc-windows-msvc.zip
            dist/install.sh
            dist/install.ps1
            dist/SHA256SUMS
