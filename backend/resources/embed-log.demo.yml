# Default demo config for embed-log
# Layout:
#   DevA    → DEVICE_A (DUT) + HOST (test controller)
#   DevB    → AUX (auxiliary monitor)
#   PYTEST  → PYTEST (test execution)
#   cbor-tab → CBOR (structured diagnostics)
#   CoAP    → CoAP (dedicated CoAP decoder pane)
#   UART    → UART_DUT + UART_DEBUG (virtual PTY serial devices)

version: 1

server:
  host: 127.0.0.1
  ws_port: 8080
  app_name: embed-log
  open_browser: true
  default_light_theme: whitesand
  default_dark_theme: one-dark
  verbose: false
  timestamp_mode: relative

frontend_plugins:
  hex-coap:
    builtin: hex-coap


logs:
  dir: logs/

sources:
  - name: SENSOR_A
    label: DEVICE_A
    type: udp
    port: 6000
    inject_port: 5001

  - name: SENSOR_B
    label: HOST
    type: udp
    port: 6001
    inject_port: 5002

  - name: SENSOR_C
    label: AUX
    type: udp
    port: 6002
    inject_port: 5003

  - name: SENSOR_D
    label: PYTEST
    type: udp
    port: 6004
    inject_port: 5004


  - name: SENSOR_COAP
    label: CoAP
    type: udp
    port: 6005
    inject_port: 5005


  - name: SENSOR_CBOR
    label: CBOR
    type: udp
    port: 6003
    parser:
      type: cbor-datagram


  # ── UART sources (PTY paths auto-generated by demo runner) ─────────
  - name: UART_DUT
    label: DUT
    type: uart
    port: __uart_dut_placeholder__
    baudrate: 115200
    inject_port: 5006

  - name: UART_DEBUG
    label: DEBUG
    type: uart
    port: __uart_debug_placeholder__
    baudrate: 115200
    inject_port: 5007

  # ── Network tab (mock capture — no Scapy needed) ──────────────────
  - name: NET_CAPTURE
    label: Net
    type: network_capture
    network_backend: mock
    interface: mock0
    mock_interval: 1.0
    bpf_filter: ""



tabs:
  - label: DevA
    panes:
      - source: SENSOR_A
        plugins: [hex-coap]
      - SENSOR_B

  - label: DevB
    panes: [SENSOR_C]

  - label: PYTEST
    panes: [SENSOR_D]

  - label: cbor-tab
    panes: [SENSOR_CBOR]

  - label: CoAP
    panes:
      - source: SENSOR_COAP
        plugins: [hex-coap]

  - label: UART
    panes: [UART_DUT, UART_DEBUG]

  - label: Network
    panes: [NET_CAPTURE]
