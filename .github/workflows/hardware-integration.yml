name: Hardware integration

on:
  workflow_dispatch:
    inputs:
      hardware_test_command:
        description: "Command run on the STM lab runner after installing the packaged CLI"
        required: false
        default: "python -m pytest sdk/python/tests/test_backend_hardware_stm32g0_multi_uart.py -q"
        type: string
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: read

# The lab owns physical devices; never run two hardware jobs concurrently.
concurrency:
  group: stm-lab-hardware
  cancel-in-progress: false

jobs:
  build-linux-cli:
    name: Build packaged Linux CLI
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build release CLI
        run: cargo build --locked --release --package embed-log-cli --bin embed-log

      - name: Package CLI
        run: ./scripts/package-cli.sh x86_64-unknown-linux-gnu

      - name: Upload packaged CLI
        uses: actions/upload-artifact@v4
        with:
          name: embed-log-cli-linux
          path: dist/embed-log-x86_64-unknown-linux-gnu.tar.gz
          if-no-files-found: error

  stm-lab:
    name: STM hardware integration
    runs-on: [self-hosted, Linux, stm-lab]
    needs: build-linux-cli
    timeout-minutes: 45
    # All paths are repository variables so the workflow never relies on
    # ttyACM/ttyUSB enumeration. The sandbox checkout is runner-provisioned
    # and must be pinned to EMBED_LOG_STM32G0_FIRMWARE_REVISION.
    env:
      EMBED_LOG_STM32G0_HARDWARE: "1"
      EMBED_LOG_STM32G0_CONTROL_PORT: ${{ vars.EMBED_LOG_STM32G0_CONTROL_PORT }}
      EMBED_LOG_STM32G0_USART1_PORT: ${{ vars.EMBED_LOG_STM32G0_USART1_PORT }}
      EMBED_LOG_STM32G0_USART3_PORT: ${{ vars.EMBED_LOG_STM32G0_USART3_PORT }}
      EMBED_LOG_STM32G0_USART4_PORT: ${{ vars.EMBED_LOG_STM32G0_USART4_PORT }}
      EMBED_LOG_STM32G0_SANDBOX_DIR: ${{ vars.EMBED_LOG_STM32G0_SANDBOX_DIR }}
      EMBED_LOG_STM32G0_FIRMWARE_REVISION: ${{ vars.EMBED_LOG_STM32G0_FIRMWARE_REVISION }}
      EMBED_LOG_STM32G0_ARTIFACT_DIR: captures/stm32g0
      HARDWARE_TEST_COMMAND: ${{ inputs.hardware_test_command || 'python -m pytest sdk/python/tests/test_backend_hardware_stm32g0_multi_uart.py -q' }}
    steps:
      - uses: actions/checkout@v4

      - name: Download exact packaged CLI
        uses: actions/download-artifact@v4
        with:
          name: embed-log-cli-linux
          path: dist

      - name: Install packaged CLI for this job only
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/embed-log/bin"
          tar -xzf dist/embed-log-x86_64-unknown-linux-gnu.tar.gz -C "$RUNNER_TEMP/embed-log/bin"
          echo "$RUNNER_TEMP/embed-log/bin" >> "$GITHUB_PATH"
          embed-log version --json

      - name: Verify all configured UARTs
        shell: bash
        run: |
          set -euo pipefail
          for name in CONTROL USART1 USART3 USART4; do
            variable="EMBED_LOG_STM32G0_${name}_PORT"
            port="${!variable}"
            test -n "$port"
            embed-log doctor --serial "$port"
          done

      - name: Set up Python harness
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install harness and firmware-preflight dependencies
        run: python -m pip install -e 'sdk/python[dev]' pyserial

      - name: Flash and preflight pinned STM32G0 firmware
        shell: bash
        run: |
          set -euo pipefail
          test -n "$EMBED_LOG_STM32G0_SANDBOX_DIR"
          test -n "$EMBED_LOG_STM32G0_FIRMWARE_REVISION"
          test -f "$EMBED_LOG_STM32G0_SANDBOX_DIR/justfile"
          test "$(git -C "$EMBED_LOG_STM32G0_SANDBOX_DIR" rev-parse HEAD)" = "$EMBED_LOG_STM32G0_FIRMWARE_REVISION"
          test -z "$(git -C "$EMBED_LOG_STM32G0_SANDBOX_DIR" status --porcelain)"
          cd "$EMBED_LOG_STM32G0_SANDBOX_DIR"
          just build
          just flash-openocd
          just verify-multi-uart

      - name: Run STM32G0 hardware integration test
        shell: bash
        run: $HARDWARE_TEST_COMMAND

      - name: Upload Embed-log sessions and support bundles
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stm-lab-artifacts-${{ github.run_id }}
          path: |
            captures/
            support*.tar.gz
          if-no-files-found: ignore
