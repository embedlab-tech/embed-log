# Full annotated embed-log config example.

version: 1

server:
  host: 127.0.0.1
  ws_port: 8080                  # HTTP/WS port (0 disables the server)
  # ws_ui: /path/to/custom.html  # custom UI HTML file (optional)
  app_name: embed-log
  open_browser: true             # auto-open browser on startup
  timestamp_mode: absolute       # absolute (wall-clock) or relative (T+ offset)
  default_light_theme: whitesand
  default_dark_theme: one-dark
  verbosity: full                # quiet | events | full
  # job_id: CI-123                # optional CI/job identifier for session naming

logs:
  dir: logs/reference_full_annotated/  # session log files output directory

baudrate: 115200                 # default UART baudrate; overridable per source

sources:
  # UART source with default baudrate
  - name: DUT_UART
    type: uart
    port: /dev/ttyUSB0
    inject_port: 5001             # TCP inject port (send simulated lines)
    # forward_ports: [7001]        # optional read-only TCP forward ports

  # UART source with custom baudrate
  - name: DEBUG_UART
    type: uart
    port: /dev/ttyACM0
    baudrate: 921600              # overrides global baudrate
    inject_port: 5002

  # UDP source (text/raw lines)
  - name: MONITOR
    type: udp
    port: 6000
    inject_port: 5003

  # UDP source with CBOR datagram parser
  - name: TELEMETRY
    type: udp
    port: 6001
    inject_port: 5004
    parser:
      type: cbor-datagram          # decodes each UDP datagram as CBOR map

frontend_plugins:
  # Built-in line plugin that scans each pane line for embedded CoAP packets
  hex-coap:
    builtin: hex-coap
tabs:
  # Single-pane tab with a per-pane frontend plugin
  - label: DUT
    panes:
      - source: DUT_UART
        plugins: [hex-coap]

  # Dual-pane tab
  - label: Debug
    panes: [DEBUG_UART, MONITOR]

  # Single-pane tab with CBOR-decoded data
  - label: Telemetry
    panes: [TELEMETRY]
