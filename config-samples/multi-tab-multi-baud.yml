# Multi-tab config with different UART baudrates
# Demonstrates: two tabs, per-source baudrate override, UDP source, inject ports.

version: 1

server:
  host: 127.0.0.1
  ws_port: 8080
  app_name: embed-log
  open_browser: false
  timestamp_mode: absolute

logs:
  dir: logs/

# This default is overridden per-source below
baudrate: 115200

sources:
  - name: MCU_HIGH
    type: uart
    port: /dev/ttyACM0
    baudrate: 921600
    inject_port: 5001

  - name: MCU_LOW
    type: uart
    port: /dev/ttyACM1
    baudrate: 9600
    inject_port: 5002

  - name: SENSOR_UDP
    type: udp
    port: 6000
    inject_port: 5003

tabs:
  - label: Main
    panes: [MCU_HIGH, MCU_LOW]

  - label: Network
    panes: [SENSOR_UDP]
